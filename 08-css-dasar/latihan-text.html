<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Latihan text styling</title>
    <style>
      body {
        text-align: center;
        font-family: Cambria, Cochin, Georgia, Times, "Times New Roman", serif;
      }
      h1 {
        letter-spacing: 10px;
        font-style: italic;
        text-transform: uppercase;
        text-decoration: underline;
        text-decoration-style: wavy;
        text-shadow: 2px 2px grey;
      }
      p {
        line-height: 2;
        word-spacing: 30px;
      }
      span {
        text-decoration: line-through;
      }
    </style>
  </head>
  <body>
    <h1>fase runtuh</h1>
    <p>
      "Tak perlu khawatie, ku hanya <span>terluka</span>. Terbiasa tuk pura-pura
      tertawa. Namun bolehkan sekali saja ku menangis? Sebelum kembali
      membohongi diri."
    </p>
  </body>
</html>
